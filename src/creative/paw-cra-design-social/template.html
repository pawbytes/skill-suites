<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Post — Taste Design</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Using Cabinet Grotesk (sans) or sticking to Geist via Fontsource equivalent if possible. We'll use a reliable modern sans via Google Fonts: Syne or Outfit for display, and standard system Fallbacks or general sans for body if needed, but per constraints we want distinctive modern fonts. Let's use 'Outfit' as it is a premium sans available publicly. -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Standard Instagram Portrait Size Container: 1080x1350 -->
  <main class="social-container">
    <div class="canvas-surface">
      
      <!-- Asymmetrical Split Layout -->
      <article class="content-zone">
        <header class="typography-architecture">
          <p class="metadata uppercase-mono">Vol. 04 / Brand ID</p>
          <h1 class="display-headline">
            Visual 
            <!-- Inline Image Typography -->
            <img src="https://picsum.photos/seed/design/120/60" alt="Design detail" class="inline-photo" />
            Elegance <br />
            Redefined.
          </h1>
        </header>

        <section class="body-zone">
          <p class="body-text">
            A restrained, gallery-airy interface with confident asymmetric layouts and fluid motion. The atmosphere is clinical yet warm — like a well-lit architecture studio.
          </p>
        </section>

        <!-- No centered symmetries, clear spatial separation -->
        <footer class="footer-zone">
           <div class="accent-mark"></div>
           <div class="author-credits">
             <img src="https://picsum.photos/seed/avatar/48/48" alt="Avatar" class="avatar-svg" />
             <div class="credits-text">
               <span class="author-name">Studio Alpha</span>
               <span class="author-role mono-role">Design Director</span>
             </div>
           </div>
        </footer>
      </article>

      <aside class="visual-zone">
        <div class="image-mask">
          <img src="https://picsum.photos/seed/abstract/800/1200" alt="Abstract conceptual art" class="hero-image" />
        </div>
      </aside>

    </div>
  </main>
</body>
</html>
